name: Build Mirror OS

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # write: push signed Mirror OS image; read: pull mirror-software-center
      id-token: write

    steps:
      - name: Checkout mirror-os
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Record the current :latest digest so we can verify it changes after build.
      # Runs after login so skopeo can authenticate. If :latest doesn't exist yet
      # (first build), stores "none" and the post-build check skips the comparison.
      - name: Capture pre-build digest of :latest
        id: pre_build
        continue-on-error: true
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST=$(skopeo inspect --raw \
            --creds "$GHCR_USER:$GHCR_TOKEN" \
            docker://ghcr.io/mirror-os/mirror-os:latest 2>/dev/null) || MANIFEST=""
          if [ -n "$MANIFEST" ]; then
            DIGEST=$(printf '%s' "$MANIFEST" | sha256sum | awk '{print $1}')
          else
            DIGEST="none"
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Pre-build :latest digest: $DIGEST"

      # Three attempts with a 60-second cooldown between each.
      # Transient failures (RPM Fusion mirror timeouts, registry blips) are
      # retried automatically.  Genuine build errors fail all three attempts
      # and surface the same exit-code as before.
      #
      # Uses repeated native steps rather than a wrapper action so that the
      # multiline cosign_private_key secret is handled by the Actions runner
      # (which masks secrets correctly) instead of being parsed as raw YAML.

      - name: Build Mirror OS image (attempt 1/3)
        id: attempt_1
        continue-on-error: true
        uses: blue-build/github-action@v1
        with:
          recipe: mirror-os.yml
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.pull_request.number }}

      - name: Cooldown before attempt 2
        if: steps.attempt_1.outcome == 'failure'
        run: sleep 60

      - name: Build Mirror OS image (attempt 2/3)
        id: attempt_2
        if: steps.attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: blue-build/github-action@v1
        with:
          recipe: mirror-os.yml
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.pull_request.number }}

      - name: Cooldown before attempt 3
        if: steps.attempt_1.outcome == 'failure' && steps.attempt_2.outcome == 'failure'
        run: sleep 60

      - name: Build Mirror OS image (attempt 3/3)
        if: steps.attempt_1.outcome == 'failure' && steps.attempt_2.outcome == 'failure'
        uses: blue-build/github-action@v1
        with:
          recipe: mirror-os.yml
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.pull_request.number }}

      # Confirm that the :latest tag was actually updated by the build.
      # Compares the post-build digest to the pre-build digest captured earlier.
      # Fails the job if the tag is unchanged (silent push failure) or unreachable.
      - name: Verify :latest tag was updated
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRE_DIGEST: ${{ steps.pre_build.outputs.digest }}
        run: |
          MANIFEST=$(skopeo inspect --raw \
            --creds "$GHCR_USER:$GHCR_TOKEN" \
            docker://ghcr.io/mirror-os/mirror-os:latest 2>/dev/null) || MANIFEST=""
          if [ -n "$MANIFEST" ]; then
            NEW=$(printf '%s' "$MANIFEST" | sha256sum | awk '{print $1}')
          else
            NEW="none"
          fi
          echo "Pre-build digest:  ${PRE_DIGEST:-none}"
          echo "Post-build digest: $NEW"
          if [ "$NEW" = "none" ]; then
            echo "ERROR: :latest is not accessible after build — tag push may have failed"
            exit 1
          fi
          if [ "${PRE_DIGEST:-none}" != "none" ] && [ "$NEW" = "$PRE_DIGEST" ]; then
            echo "ERROR: :latest digest is unchanged — tag was not updated"
            exit 1
          fi
          echo ":latest successfully updated (sha256:$NEW)"
