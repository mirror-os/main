name: Build Mirror OS

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  # Pre-build job: construct the full app catalog (Flatpak + Nix + all icons) and
  # upload as artifacts so the image build can bake them in directly.
  catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout mirror-os
        uses: actions/checkout@v4

      # Compute week number for cache key (YYYY-WW).
      # Cache expires weekly, aligned with nixpkgs release cadence.
      - name: Compute week number
        id: week
        run: echo "week=$(date -u '+%Y-%W')" >> "$GITHUB_OUTPUT"

      # Download Flathub AppStream XML + icon cache.
      # mirror-catalog-update --source flatpak reads from this local cache.
      - name: Install flatpak and download Flathub AppStream
        run: |
          sudo apt-get install -y flatpak
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak update --appstream --noninteractive

      # Restore nix-icon incremental state across weekly builds.
      # Includes nix-index-database (~92 MB) and state.json (which packages are done).
      # On cache miss: nix-icons.py re-downloads the DB and re-processes changed packages.
      - name: Restore nix-icon cache
        uses: actions/cache@v4
        with:
          path: /tmp/catalog-ci/.local/share/mirror-os/media/.nix-icon-cache
          key: nix-icon-cache-${{ steps.week.outputs.week }}

      # Build Flatpak catalog + Flatpak icons.
      # Reads from the local AppStream cache populated above — no additional network calls.
      - name: Build Flatpak catalog and icons
        run: |
          mkdir -p /tmp/catalog-ci/.local/share/mirror-os
          chmod +x files/usr/libexec/mirror-os/mirror-catalog-update
          HOME=/tmp/catalog-ci files/usr/libexec/mirror-os/mirror-catalog-update \
            --source flatpak

      # Install Determinate Nix (needed for nix search and nix profile install).
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      # Build Nix package catalog (runs nix search nixpkgs '.*' --json, ~2 min).
      - name: Build Nix catalog
        run: |
          HOME=/tmp/catalog-ci files/usr/libexec/mirror-os/mirror-catalog-update \
            --source nix --no-media

      # Extract Nix icons from NARs via nix-index-database + cache.nixos.org.
      # First run: ~16 min. Cached run: ~2 min (only re-processes changed packages).
      - name: Extract Nix icons
        run: |
          nix profile install nixpkgs#nix-index
          python3 catalog-data/scripts/nix-icons.py \
            --db /tmp/catalog-ci/.local/share/mirror-os/catalog.db \
            --media-dir /tmp/catalog-ci/.local/share/mirror-os/media

      # Clear build-time icon_local_path values before baking into the image.
      # mirror-catalog-bootstrap re-derives these from the icons/ directory on
      # first login and on each image update, pointing to the user's actual paths.
      - name: Clear build-time icon paths
        run: |
          python3 - /tmp/catalog-ci/.local/share/mirror-os/catalog.db << 'EOF'
          import sqlite3, sys
          conn = sqlite3.connect(sys.argv[1], timeout=30)
          with conn:
              conn.execute("UPDATE flatpak_apps SET icon_local_path = ''")
              try: conn.execute("UPDATE nix_packages SET icon_local_path = ''")
              except Exception: pass
          conn.close()
          EOF

      # Package catalog.db and all icons (Flatpak + Nix) as artifacts.
      - name: Package catalog artifacts
        run: |
          cp /tmp/catalog-ci/.local/share/mirror-os/catalog.db catalog.db
          tar --zstd -cf icons.tar.zst \
            -C /tmp/catalog-ci/.local/share/mirror-os/media icons/
          echo "catalog.db: $(du -sh catalog.db | cut -f1)"
          echo "icons.tar.zst: $(du -sh icons.tar.zst | cut -f1)"

      - name: Upload catalog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: catalog-artifacts
          path: |
            catalog.db
            icons.tar.zst
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    needs: [catalog]
    permissions:
      contents: read
      packages: write    # write: push signed Mirror OS image; read: pull mirror-software-center
      id-token: write

    steps:
      - name: Checkout mirror-os
        uses: actions/checkout@v4

      # Inject pre-built catalog into the source tree.
      # The recipe's files module copies files/usr/ → /usr/ before build-catalog.sh
      # runs, so catalog.db and icons land at /usr/share/mirror-os/ and
      # build-catalog.sh detects them and skips the local build.
      - name: Download catalog artifacts
        uses: actions/download-artifact@v4
        with:
          name: catalog-artifacts
          path: /tmp/catalog-artifacts

      - name: Inject catalog into image source tree
        run: |
          mkdir -p files/usr/share/mirror-os/media
          cp /tmp/catalog-artifacts/catalog.db files/usr/share/mirror-os/catalog.db
          tar --zstd -xf /tmp/catalog-artifacts/icons.tar.zst \
            -C files/usr/share/mirror-os/media
          echo "Injected: $(du -sh files/usr/share/mirror-os/catalog.db | cut -f1) catalog.db"
          echo "Injected: $(ls files/usr/share/mirror-os/media/icons/*.png 2>/dev/null | wc -l) icons"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Record the current :latest digest so we can verify it changes after build.
      # Runs after login so skopeo can authenticate. If :latest doesn't exist yet
      # (first build), stores "none" and the post-build check skips the comparison.
      - name: Capture pre-build digest of :latest
        id: pre_build
        continue-on-error: true
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST=$(skopeo inspect --raw \
            --creds "$GHCR_USER:$GHCR_TOKEN" \
            docker://ghcr.io/mirror-os/mirror-os:latest 2>/dev/null) || MANIFEST=""
          if [ -n "$MANIFEST" ]; then
            DIGEST=$(printf '%s' "$MANIFEST" | sha256sum | awk '{print $1}')
          else
            DIGEST="none"
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Pre-build :latest digest: $DIGEST"

      # Three attempts with a 60-second cooldown between each.
      # Transient failures (RPM Fusion mirror timeouts, registry blips) are
      # retried automatically.  Genuine build errors fail all three attempts
      # and surface the same exit-code as before.
      #
      # Uses repeated native steps rather than a wrapper action so that the
      # multiline cosign_private_key secret is handled by the Actions runner
      # (which masks secrets correctly) instead of being parsed as raw YAML.

      - name: Build Mirror OS image (attempt 1/3)
        id: attempt_1
        continue-on-error: true
        uses: blue-build/github-action@v1
        with:
          recipe: mirror-os.yml
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.pull_request.number }}

      - name: Cooldown before attempt 2
        if: steps.attempt_1.outcome == 'failure'
        run: sleep 60

      - name: Build Mirror OS image (attempt 2/3)
        id: attempt_2
        if: steps.attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: blue-build/github-action@v1
        with:
          recipe: mirror-os.yml
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.pull_request.number }}

      - name: Cooldown before attempt 3
        if: steps.attempt_1.outcome == 'failure' && steps.attempt_2.outcome == 'failure'
        run: sleep 60

      - name: Build Mirror OS image (attempt 3/3)
        if: steps.attempt_1.outcome == 'failure' && steps.attempt_2.outcome == 'failure'
        uses: blue-build/github-action@v1
        with:
          recipe: mirror-os.yml
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.pull_request.number }}

      # Confirm that the :latest tag was actually updated by the build.
      # Compares the post-build digest to the pre-build digest captured earlier.
      # Fails the job if the tag is unchanged (silent push failure) or unreachable.
      - name: Verify :latest tag was updated
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRE_DIGEST: ${{ steps.pre_build.outputs.digest }}
        run: |
          MANIFEST=$(skopeo inspect --raw \
            --creds "$GHCR_USER:$GHCR_TOKEN" \
            docker://ghcr.io/mirror-os/mirror-os:latest 2>/dev/null) || MANIFEST=""
          if [ -n "$MANIFEST" ]; then
            NEW=$(printf '%s' "$MANIFEST" | sha256sum | awk '{print $1}')
          else
            NEW="none"
          fi
          echo "Pre-build digest:  ${PRE_DIGEST:-none}"
          echo "Post-build digest: $NEW"
          if [ "$NEW" = "none" ]; then
            echo "ERROR: :latest is not accessible after build — tag push may have failed"
            exit 1
          fi
          if [ "${PRE_DIGEST:-none}" != "none" ] && [ "$NEW" = "$PRE_DIGEST" ]; then
            echo "ERROR: :latest digest is unchanged — tag was not updated"
            exit 1
          fi
          echo ":latest successfully updated (sha256:$NEW)"
