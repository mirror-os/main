name: Trigger catalog-data rebuild

# Fires when catalog-related scripts change so the pre-built catalog stays in
# sync with the latest mirror-catalog-update code without waiting for the
# catalog-data repo's scheduled run.
#
# Prerequisites:
#   Add a secret CATALOG_DATA_PAT to this repo: a Fine-Grained PAT with
#   Actions: read/write permission on mirror-os/catalog-data.

on:
  push:
    branches: [main]
    paths:
      - 'files/usr/libexec/mirror-os/mirror-catalog-update'
      - 'files/scripts/build-catalog.sh'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger catalog-data rebuild
        env:
          GH_TOKEN: ${{ secrets.CATALOG_DATA_PAT }}
        run: |
          gh workflow run update.yml --repo mirror-os/catalog-data
          echo "Triggered update.yml in mirror-os/catalog-data."
